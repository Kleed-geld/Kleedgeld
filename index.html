<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#18181A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kleedgeld"/>
  <meta name="description" content="Persoonlijk budgetoverzicht voor kleding"/>
  <title>Kleedgeld</title>

  <!-- PWA manifest inline -->
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Kleedgeld%22%2C%22short_name%22%3A%22Kleedgeld%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2318181A%22%2C%22theme_color%22%3A%22%2318181A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%270%250%2532%2532%2527%253E%253Ccircle%2520cx%3D%252716%2527%2520cy%3D%252716%2527%2520r%3D%252716%2527%2520fill%3D%2527%2523C8A46A%2527%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ════════════════════════════════════════════════════════════════
   RESET & TOKENS
════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Palette */
  --bg:          #F8F7F3;
  --bg-2:        #F0EEE8;
  --surface:     #FFFFFF;
  --surface-2:   #F4F2EC;
  --text-1:      #18181A;
  --text-2:      #5C5B54;
  --text-3:      #9E9D95;
  --text-inv:    #FFFFFF;

  /* Accent — warm amber gold */
  --gold:        #C8A46A;
  --gold-lt:     #F5EDDA;
  --gold-dk:     #8C6C36;

  /* Semantic */
  --green:       #2E6B4F;
  --green-lt:    #E4F2EB;
  --green-mid:   #A8D4BC;
  --red:         #A84430;
  --red-lt:      #F5E8E4;
  --red-mid:     #DFB0A4;

  /* Structure */
  --border:      #E6E4DD;
  --divider:     #EDEAE3;
  --sidebar-w:   240px;

  /* Shadows */
  --sh-xs: 0 1px 2px rgba(24,24,26,.06);
  --sh-sm: 0 2px 8px rgba(24,24,26,.07), 0 1px 2px rgba(24,24,26,.04);
  --sh-md: 0 6px 24px rgba(24,24,26,.09), 0 2px 6px rgba(24,24,26,.05);
  --sh-lg: 0 16px 48px rgba(24,24,26,.14), 0 4px 12px rgba(24,24,26,.06);

  /* Radius */
  --r-xs:  4px;
  --r-sm:  8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
  --r-2xl:32px;
  --r-full:999px;

  /* Transitions */
  --ease: cubic-bezier(.25,.46,.45,.94);
  --spring: cubic-bezier(.34,1.56,.64,1);
}

html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ════════════════════════════════════════════════════════════════
   LAYOUT SHELL
════════════════════════════════════════════════════════════════ */
.shell { display: flex; min-height: 100vh; min-height: 100dvh; }

/* ─── Sidebar ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  position: fixed; top: 0; left: 0; bottom: 0;
  background: var(--text-1);
  display: flex; flex-direction: column;
  z-index: 200;
  transition: transform .28s var(--ease);
  overflow: hidden;
}

/* Subtle texture overlay */
.sidebar::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 120% 60% at 80% 10%, rgba(200,164,106,.12) 0%, transparent 70%),
              radial-gradient(ellipse 80% 80% at 20% 90%, rgba(200,164,106,.06) 0%, transparent 60%);
  pointer-events:none;
}

.sidebar-inner { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; padding:28px 16px; }

.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 0 8px 28px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 24px;
}
.brand-icon {
  width:36px; height:36px; border-radius:10px;
  background: var(--gold);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  font-family:'Fraunces',serif; font-size:18px; color:#fff; font-weight:700;
  letter-spacing:-0.5px;
}
.brand-text h1 {
  font-family:'Fraunces',serif; font-size:17px; font-weight:600;
  color:#fff; letter-spacing:-0.3px; line-height:1.1;
}
.brand-text p { font-size:10px; color:rgba(255,255,255,.35); margin-top:2px; letter-spacing:0.3px; }

.nav { display:flex; flex-direction:column; gap:2px; flex:1; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--r-md);
  border:none; background:transparent; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  color:rgba(255,255,255,.5);
  text-align:left; width:100%;
  transition:background .15s, color .15s;
  position:relative;
}
.nav-item:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.85); }
.nav-item.active {
  background:rgba(200,164,106,.18);
  color:var(--gold);
  font-weight:600;
}
.nav-item.active::before {
  content:'';
  position:absolute; left:0; top:50%; transform:translateY(-50%);
  width:3px; height:60%; background:var(--gold);
  border-radius:0 2px 2px 0;
}

.sidebar-actions {
  margin-top:auto; padding-top:20px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex; flex-direction:column; gap:8px;
}
.sidebar-action-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:10px; border-radius:var(--r-md); border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  transition: opacity .15s, transform .1s;
  width:100%;
}
.sidebar-action-btn:active { transform:scale(.98); }
.sidebar-action-btn:hover { opacity:.88; }
.sidebar-action-btn.expense { background:var(--red-lt); color:var(--red); }
.sidebar-action-btn.income  { background:var(--green-lt); color:var(--green); }

/* ─── Main ─────────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  flex:1;
  min-height:100vh; min-height:100dvh;
  display:flex; flex-direction:column;
}

/* ─── Topbar (mobile only) ─────────────────────────────────── */
.topbar {
  display:none;
  align-items:center; justify-content:space-between;
  padding:14px 20px;
  background:var(--text-1);
  position:sticky; top:0; z-index:150;
}
.topbar-brand {
  font-family:'Fraunces',serif; font-size:18px;
  color:#fff; letter-spacing:-0.3px;
}
.topbar-actions { display:flex; gap:8px; }
.topbar-btn {
  width:34px; height:34px; border-radius:var(--r-sm);
  background:rgba(255,255,255,.1); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:#fff;
  transition:background .15s;
}
.topbar-btn:hover { background:rgba(255,255,255,.18); }

/* ─── Bottom nav (mobile only) ─────────────────────────────── */
.bottom-nav {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:var(--text-1);
  border-top:1px solid rgba(255,255,255,.08);
  z-index:150;
  padding-bottom:max(env(safe-area-inset-bottom), 8px);
}
.bottom-nav-inner { display:flex; }
.bottom-nav-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; padding:10px 0;
  border:none; background:transparent; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:10px; font-weight:500;
  color:rgba(255,255,255,.35);
  transition:color .15s;
}
.bottom-nav-btn.active { color:var(--gold); }

/* ════════════════════════════════════════════════════════════════
   PAGE CONTENT
════════════════════════════════════════════════════════════════ */
.page {
  padding: 40px 44px;
  max-width: 900px;
  animation: pageIn .22s var(--ease);
}
@keyframes pageIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.page-header { margin-bottom:36px; }
.page-title {
  font-family:'Fraunces',serif; font-size:32px; font-weight:600;
  letter-spacing:-0.8px; color:var(--text-1);
}
.page-subtitle { font-size:13px; color:var(--text-3); margin-top:5px; }

/* ════════════════════════════════════════════════════════════════
   BALANCE CARD
════════════════════════════════════════════════════════════════ */
.balance-card {
  background:var(--text-1);
  border-radius:var(--r-2xl);
  padding:36px 40px;
  margin-bottom:20px;
  position:relative; overflow:hidden;
  box-shadow:var(--sh-lg);
}
.balance-card::after {
  content:'';
  position:absolute; bottom:-80px; right:-80px;
  width:260px; height:260px; border-radius:50%;
  background:rgba(200,164,106,.07);
  pointer-events:none;
}
.balance-card::before {
  content:'';
  position:absolute; top:-40px; left:40%;
  width:300px; height:200px; border-radius:50%;
  background:rgba(255,255,255,.025);
  pointer-events:none;
}
.balance-card.neg { background:linear-gradient(135deg, #4A1508 0%, #7A2010 100%); }

.balance-eyebrow {
  font-size:10px; font-weight:600; letter-spacing:1.4px; text-transform:uppercase;
  color:rgba(255,255,255,.38); margin-bottom:10px;
}
.balance-number {
  font-family:'Fraunces',serif;
  font-size:clamp(40px,5.5vw,60px);
  font-weight:600; letter-spacing:-2px; line-height:1;
  color:#fff; margin-bottom:28px;
}
.balance-rule { height:1px; background:rgba(255,255,255,.09); margin-bottom:20px; }
.balance-stats { display:flex; gap:0; }
.balance-stat { flex:1; }
.balance-stat + .balance-stat { border-left:1px solid rgba(255,255,255,.09); padding-left:24px; }
.balance-stat-label { font-size:10px; color:rgba(255,255,255,.3); margin-bottom:5px; }
.balance-stat-value { font-size:14px; font-weight:600; }
.balance-stat-value.inc { color:#80C9A0; }
.balance-stat-value.exp { color:#E8A090; }

/* ════════════════════════════════════════════════════════════════
   ACTION BUTTONS
════════════════════════════════════════════════════════════════ */
.actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:36px; }
.action-btn {
  display:flex; align-items:center; gap:12px;
  padding:16px 20px;
  border-radius:var(--r-lg);
  border:1.5px solid; cursor:pointer;
  background:none; font-family:'DM Sans',sans-serif; text-align:left;
  transition:transform .12s, box-shadow .12s;
}
.action-btn:hover { transform:translateY(-2px); box-shadow:var(--sh-md); }
.action-btn:active { transform:scale(.99); }
.action-btn.expense { background:var(--red-lt); border-color:var(--red-mid); }
.action-btn.income  { background:var(--green-lt); border-color:var(--green-mid); }
.action-icon {
  width:36px; height:36px; border-radius:var(--r-sm); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.action-text-label { font-size:13px; font-weight:600; }
.action-text-sub   { font-size:11px; margin-top:1px; opacity:.65; }

/* ════════════════════════════════════════════════════════════════
   CARDS
════════════════════════════════════════════════════════════════ */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:24px;
}
.card-sm { padding:16px; border-radius:var(--r-lg); }

/* ════════════════════════════════════════════════════════════════
   SECTION HEADERS
════════════════════════════════════════════════════════════════ */
.section-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.section-title { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
.section-link {
  font-size:12px; color:var(--gold); font-weight:600; letter-spacing:0.2px;
  border:none; background:none; cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:color .15s;
}
.section-link:hover { color:var(--gold-dk); }

/* ════════════════════════════════════════════════════════════════
   TRANSACTION ROWS
════════════════════════════════════════════════════════════════ */
.tx-list { display:flex; flex-direction:column; }
.tx-row {
  display:flex; align-items:center; gap:14px;
  padding:13px 0;
  border-bottom:1px solid var(--divider);
  transition: background .1s;
}
.tx-row:last-child { border-bottom:none; padding-bottom:0; }
.tx-row:first-child { padding-top:0; }
.tx-row:hover .tx-del { opacity:1; }

.tx-dot {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.tx-dot.income  { background:var(--green-lt); }
.tx-dot.expense { background:var(--red-lt); }

.tx-body { flex:1; min-width:0; }
.tx-desc {
  font-size:14px; font-weight:500; color:var(--text-1);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.tx-date { font-size:11px; color:var(--text-3); margin-top:2px; }
.tx-amt { font-size:14px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.tx-amt.income  { color:var(--green); }
.tx-amt.expense { color:var(--red); }

.tx-del {
  width:28px; height:28px; border-radius:var(--r-sm);
  border:none; background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-3); opacity:0; flex-shrink:0;
  transition:opacity .15s, background .15s, color .15s;
}
.tx-del:hover { background:var(--red-lt); color:var(--red); opacity:1; }

.auto-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:9px; font-weight:600; letter-spacing:0.3px;
  background:var(--gold-lt); color:var(--gold-dk);
  border-radius:var(--r-full); padding:2px 6px;
  flex-shrink:0;
}

/* ════════════════════════════════════════════════════════════════
   FILTER TABS
════════════════════════════════════════════════════════════════ */
.filter-tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
.filter-tab {
  padding:6px 14px; border-radius:var(--r-full);
  border:1.5px solid var(--border); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  background:var(--surface); color:var(--text-2);
  transition:all .15s;
}
.filter-tab:hover { border-color:var(--text-3); color:var(--text-1); }
.filter-tab.active { background:var(--text-1); border-color:var(--text-1); color:#fff; }

/* ════════════════════════════════════════════════════════════════
   STATS GRID
════════════════════════════════════════════════════════════════ */
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
@media (min-width:680px) { .stats-grid { grid-template-columns:repeat(4,1fr); } }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:20px;
  display:flex; flex-direction:column; gap:10px;
  transition: box-shadow .15s, transform .15s;
}
.stat-card:hover { box-shadow:var(--sh-sm); transform:translateY(-1px); }
.stat-icon {
  width:36px; height:36px; border-radius:var(--r-md);
  display:flex; align-items:center; justify-content:center;
}
.stat-val {
  font-family:'Fraunces',serif; font-size:22px; font-weight:600;
  letter-spacing:-0.5px; color:var(--text-1);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.stat-lbl { font-size:11px; color:var(--text-3); line-height:1.4; }

/* ════════════════════════════════════════════════════════════════
   SVG LINE CHART
════════════════════════════════════════════════════════════════ */
.chart-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:28px; margin-bottom:20px;
}
.chart-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; }
.chart-header-left h3 { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
.chart-header-left p { font-size:12px; color:var(--text-3); margin-top:3px; }
.chart-current {
  font-family:'Fraunces',serif; font-size:20px; font-weight:600;
  letter-spacing:-0.5px; color:var(--text-1); text-align:right;
}
.chart-current-label { font-size:10px; color:var(--text-3); text-align:right; margin-top:2px; }
.chart-svg { width:100%; display:block; overflow:visible; }

/* ════════════════════════════════════════════════════════════════
   TOP UITGAVEN
════════════════════════════════════════════════════════════════ */
.top-list { display:flex; flex-direction:column; gap:14px; }
.top-row { display:flex; align-items:center; gap:12px; }
.top-rank {
  font-size:11px; font-weight:700; color:var(--text-3);
  width:18px; text-align:center; flex-shrink:0;
}
.top-content { flex:1; min-width:0; }
.top-labels { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.top-name { font-size:13px; font-weight:500; color:var(--text-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.top-amt  { font-size:13px; font-weight:600; color:var(--red); white-space:nowrap; margin-left:8px; }
.top-track { height:3px; background:var(--surface-2); border-radius:99px; overflow:hidden; }
.top-fill  { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-dk)); border-radius:99px; transition:width .7s var(--ease); }

/* ════════════════════════════════════════════════════════════════
   RECURRING CARDS
════════════════════════════════════════════════════════════════ */
.rec-list { display:flex; flex-direction:column; gap:10px; }
.rec-card {
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:16px 18px;
  transition:opacity .2s, box-shadow .15s;
}
.rec-card:hover { box-shadow:var(--sh-sm); }
.rec-card.off { opacity:.45; }
.rec-avatar {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--green-lt); color:var(--green);
}
.rec-avatar.off { background:var(--surface-2); color:var(--text-3); }
.rec-body { flex:1; min-width:0; }
.rec-name { font-size:14px; font-weight:600; color:var(--text-1); }
.rec-meta { font-size:11px; color:var(--text-2); margin-top:2px; }
.rec-last { font-size:10px; color:var(--text-3); font-style:italic; margin-top:2px; }
.rec-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.pill {
  padding:4px 10px; border-radius:var(--r-full); border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  transition:all .15s;
}
.pill.on  { background:var(--green-lt); color:var(--green); }
.pill.off { background:var(--surface-2); color:var(--text-3); }

/* ════════════════════════════════════════════════════════════════
   EMPTY STATES
════════════════════════════════════════════════════════════════ */
.empty {
  display:flex; flex-direction:column; align-items:center;
  padding:64px 24px; gap:14px; text-align:center;
}
.empty-icon {
  width:80px; height:80px; border-radius:var(--r-xl);
  background:var(--gold-lt);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:8px; font-size:32px;
}
.empty-title { font-family:'Fraunces',serif; font-size:20px; font-weight:600; letter-spacing:-0.3px; }
.empty-body  { font-size:14px; color:var(--text-3); line-height:1.65; max-width:300px; }

/* ════════════════════════════════════════════════════════════════
   BUTTONS (global)
════════════════════════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 20px; border-radius:var(--r-lg); border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  transition:opacity .15s, transform .1s, box-shadow .15s;
  text-decoration:none; white-space:nowrap;
}
.btn:hover   { opacity:.9; }
.btn:active  { transform:scale(.98); }
.btn-gold    { background:var(--gold); color:#fff; box-shadow:0 2px 12px rgba(200,164,106,.35); }
.btn-dark    { background:var(--text-1); color:#fff; }
.btn-green   { background:var(--green); color:#fff; }
.btn-red     { background:var(--red); color:#fff; }
.btn-ghost   { background:var(--surface-2); color:var(--text-2); }
.btn-ghost:hover { background:var(--divider); }
.btn-sm      { padding:7px 14px; font-size:12px; border-radius:var(--r-md); }
.btn-full    { width:100%; }
.icon-btn {
  width:36px; height:36px; border-radius:var(--r-md);
  background:transparent; border:none; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--text-2);
  transition:background .15s, color .15s;
}
.icon-btn:hover { background:var(--surface-2); color:var(--text-1); }

/* ════════════════════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; background:rgba(15,15,15,.5);
  display:flex; align-items:center; justify-content:center;
  z-index:400; padding:20px;
  animation:overlayIn .18s ease;
  backdrop-filter:blur(2px);
}
@keyframes overlayIn { from{opacity:0} to{opacity:1} }

.modal {
  background:var(--surface); border-radius:var(--r-2xl);
  width:100%; max-width:460px; max-height:92dvh; overflow-y:auto;
  box-shadow:var(--sh-lg);
  animation:modalIn .24s var(--spring);
}
@keyframes modalIn {
  from { opacity:0; transform:scale(.93) translateY(16px); }
  to   { opacity:1; transform:none; }
}
.modal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:24px 24px 0;
}
.modal-title {
  font-family:'Fraunces',serif; font-size:22px; font-weight:600;
  letter-spacing:-0.4px;
}
.modal-body { padding:24px; display:flex; flex-direction:column; gap:20px; }

/* ════════════════════════════════════════════════════════════════
   FORM ELEMENTS
════════════════════════════════════════════════════════════════ */
.field { display:flex; flex-direction:column; gap:7px; }
.label {
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--text-3);
}
.input {
  width:100%; padding:12px 14px;
  border:1.5px solid var(--border); border-radius:var(--r-md);
  font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-1);
  background:var(--surface); outline:none;
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none;
}
.input:focus {
  border-color:var(--gold);
  box-shadow:0 0 0 3.5px rgba(200,164,106,.14);
}
.input::placeholder { color:var(--text-3); }
/* Date input fix */
.input[type=date] { color-scheme:light; }

/* Type toggle */
.type-seg {
  display:flex; gap:4px; background:var(--surface-2);
  border-radius:var(--r-lg); padding:4px;
}
.type-seg-btn {
  flex:1; padding:9px; border-radius:var(--r-md); border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  color:var(--text-3); background:transparent;
  transition:background .15s, color .15s;
}
.type-seg-btn.income.on  { background:var(--green-lt); color:var(--green); }
.type-seg-btn.expense.on { background:var(--red-lt); color:var(--red); }

/* Amount hero input */
.amount-field {
  display:flex; align-items:center; gap:6px;
  padding-bottom:14px; border-bottom:2px solid var(--border);
  transition:border-color .15s;
}
.amount-field:focus-within { border-bottom-color:var(--gold); }
.amount-sym {
  font-family:'Fraunces',serif; font-size:30px; line-height:1;
  font-weight:300; flex-shrink:0;
}
.amount-sym.income  { color:var(--green); }
.amount-sym.expense { color:var(--red); }
.amount-inp {
  border:none; outline:none; background:transparent;
  font-family:'Fraunces',serif;
  font-size:clamp(34px,7vw,50px); font-weight:600;
  letter-spacing:-2px; line-height:1; width:100%;
}
.amount-inp.income  { color:var(--green); }
.amount-inp.expense { color:var(--red); }
.amount-inp::placeholder { color:var(--text-3); opacity:.4; }

/* Frequency chips */
.freq-chips { display:flex; flex-wrap:wrap; gap:8px; }
.freq-chip {
  padding:7px 14px; border-radius:var(--r-full);
  border:1.5px solid var(--border); background:var(--surface);
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  color:var(--text-2); cursor:pointer;
  transition:all .15s;
}
.freq-chip:hover { border-color:var(--text-3); }
.freq-chip.on { background:var(--text-1); border-color:var(--text-1); color:#fff; }

/* Error text */
.error-text { font-size:12px; color:var(--red); margin-top:-8px; }

/* ════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════ */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--text-1); color:#fff;
  padding:11px 20px; border-radius:var(--r-full);
  font-size:13px; font-weight:500; white-space:nowrap;
  box-shadow:var(--sh-md); z-index:500;
  animation:toastIn .3s var(--spring);
  display:flex; align-items:center; gap:8px;
}
@keyframes toastIn {
  from { opacity:0; transform:translateX(-50%) translateY(14px) scale(.96); }
  to   { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
}
.toast-dot {
  width:6px; height:6px; border-radius:50%; background:var(--gold); flex-shrink:0;
}

/* ════════════════════════════════════════════════════════════════
   DATUM GROEPEN
════════════════════════════════════════════════════════════════ */
.month-group { margin-bottom:28px; }

  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.9px; color:var(--text-3);

/* ════════════════════════════════════════════════════════════════
   PWA INSTALL BANNER
════════════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════════ */

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useReducer, useCallback, useMemo, useRef, createContext, useContext } = React;

/* ════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,9);

const fmt€ = n => new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(n);

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso), now = new Date();
    const tod = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const yes = new Date(tod); yes.setDate(tod.getDate()-1);
    const tgt = new Date(d.getFullYear(),d.getMonth(),d.getDate());
    if (+tgt===+tod) return 'Vandaag';
    if (+tgt===+yes) return 'Gisteren';
    const opts = {day:'numeric',month:'long'};
    if (d.getFullYear()!==now.getFullYear()) opts.year='numeric';
    return d.toLocaleDateString('nl-NL',opts);
  } catch { return '—'; }
}
const fmtShort = iso => new Date(iso).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
const fmtMonth = iso => {
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
};

function parseAmt(s) {
  return parseFloat(s.replace(/[^\d,.]/g,'').replace(',','.'));
}

const FREQ_LBL = { daily:'Dagelijks', weekly:'Wekelijks', biweekly:'Om de 2 weken', monthly:'Maandelijks', yearly:'Jaarlijks' };

function addFreq(d,f) {
  const r=new Date(d);
  if(f==='daily')    r.setDate(r.getDate()+1);
  if(f==='weekly')   r.setDate(r.getDate()+7);
  if(f==='biweekly') r.setDate(r.getDate()+14);
  if(f==='monthly')  r.setMonth(r.getMonth()+1);
  if(f==='yearly')   r.setFullYear(r.getFullYear()+1);
  return r;
}
const sod = d => { const r=new Date(d); r.setHours(0,0,0,0); return r; };

function genMissing(entry) {
  const today = sod(new Date());
  const base  = sod(new Date(entry.lastProcessed||entry.startDate));
  const list  = [];
  let c = addFreq(base, entry.frequency);
  let n = 0;
  while (c <= today && n++ < 500) {
    list.push({
      id:`rec-${entry.id}-${c.toISOString().slice(0,10)}`,
      type:'income', amount:entry.amount,
      description:`${entry.description} (automatisch)`,
      date:c.toISOString(), isRecurring:true, recurringId:entry.id
    });
    c = addFreq(c, entry.frequency);
  }
  const newLP = list.length ? list[list.length-1].date : (entry.lastProcessed||entry.startDate);
  return { list, newLP };
}

/* ════════════════════════════════════════════════════════════════
   CALCULATIONS
════════════════════════════════════════════════════════════════ */
const calcBal = txs => txs.reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);

function monthRange() {
  const n=new Date();
  return { start:new Date(n.getFullYear(),n.getMonth(),1), end:new Date(n.getFullYear(),n.getMonth()+1,0,23,59,59) };
}
const expMonth = txs => { const{start,end}=monthRange(); return txs.filter(t=>t.type==='expense'&&new Date(t.date)>=start&&new Date(t.date)<=end).reduce((s,t)=>s+t.amount,0); };
const incMonth = txs => { const{start,end}=monthRange(); return txs.filter(t=>t.type==='income'&&new Date(t.date)>=start&&new Date(t.date)<=end).reduce((s,t)=>s+t.amount,0); };
const expYear  = txs => { const s=new Date(new Date().getFullYear(),0,1); return txs.filter(t=>t.type==='expense'&&new Date(t.date)>=s).reduce((s,t)=>s+t.amount,0); };

function buildChart(txs, days=60) {
  const today=sod(new Date());
  const cutoff=new Date(today); cutoff.setDate(today.getDate()-(days-1));
  const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let running=sorted.filter(t=>sod(new Date(t.date))<cutoff).reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
  const pts=[];
  for(let i=0;i<days;i++){
    const d=new Date(cutoff); d.setDate(cutoff.getDate()+i);
    const k=d.toISOString().slice(0,10);
    sorted.filter(t=>t.date.slice(0,10)===k).forEach(t=>{ running+=t.type==='income'?t.amount:-t.amount; });
    pts.push({date:k,balance:running});
  }
  return pts;
}

function topExp(txs,n=5) {
  const m=new Map();
  txs.filter(t=>t.type==='expense').forEach(t=>{
    const k=t.description.trim().toLowerCase();
    const e=m.get(k)||{total:0,count:0};
    m.set(k,{total:e.total+t.amount,count:e.count+1});
  });
  return [...m.entries()].map(([k,v])=>({label:k.charAt(0).toUpperCase()+k.slice(1),...v})).sort((a,b)=>b.total-a.total).slice(0,n);
}

/* ════════════════════════════════════════════════════════════════
   STORAGE  — localStorage met versie-prefix
════════════════════════════════════════════════════════════════ */
const K = { TX:'kg2_tx', REC:'kg2_rec' };

function loadAll() {
  try {
    return {
      txs:  JSON.parse(localStorage.getItem(K.TX)  || '[]'),
      recs: JSON.parse(localStorage.getItem(K.REC) || '[]'),
    };
  } catch { return { txs:[], recs:[] }; }
}
const persist = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} };

/* ════════════════════════════════════════════════════════════════
   APP STATE — Context + Reducer
════════════════════════════════════════════════════════════════ */
const Ctx = createContext(null);

function reducer(s,a) {
  switch(a.type) {
    case 'INIT':   return {...s, txs:a.txs, recs:a.recs, ready:true};
    case 'ADD_TX': return {...s, txs:[a.tx,...s.txs]};
    case 'DEL_TX': return {...s, txs:s.txs.filter(t=>t.id!==a.id)};
    case 'ADD_REC':return {...s, recs:[...s.recs,a.rec]};
    case 'UPD_REC':return {...s, recs:s.recs.map(r=>r.id===a.rec.id?a.rec:r)};
    case 'DEL_REC':return {...s, recs:s.recs.filter(r=>r.id!==a.id)};
    case 'SCHED':  return {
      ...s,
      txs:[...a.newTxs,...s.txs],
      recs:s.recs.map(r=>{ const u=a.upd.find(x=>x.id===r.id); return u||r; })
    };
    default: return s;
  }
}

function Provider({children}) {
  const [s,dispatch]=useReducer(reducer,{txs:[],recs:[],ready:false});
  const ready=useRef(false);

  useEffect(()=>{
    const{txs,recs}=loadAll();
    dispatch({type:'INIT',txs,recs});
    ready.current=true;

    // Scheduler
    const ids=new Set(txs.map(t=>t.id));
    const newTxs=[]; const upd=[];
    for(const r of recs){
      if(!r.isActive) continue;
      const{list,newLP}=genMissing(r);
      const fresh=list.filter(t=>!ids.has(t.id));
      if(fresh.length){
        fresh.forEach(t=>ids.add(t.id));
        newTxs.push(...fresh);
        upd.push({...r,lastProcessed:newLP});
      }
    }
    if(newTxs.length){
      dispatch({type:'SCHED',newTxs,upd});
      const mergedR=recs.map(r=>{ const u=upd.find(x=>x.id===r.id); return u||r; });
      persist(K.TX,[...newTxs,...txs]);
      persist(K.REC,mergedR);
    }
  },[]);

  useEffect(()=>{ if(s.ready) persist(K.TX,s.txs); },[s.txs]);
  useEffect(()=>{ if(s.ready) persist(K.REC,s.recs); },[s.recs]);

  const addTx  = useCallback((type,amount,desc,date)=>dispatch({type:'ADD_TX',tx:{id:uid(),type,amount,description:desc.trim(),date}}),[]);
  const delTx  = useCallback(id=>dispatch({type:'DEL_TX',id}),[]);
  const addRec = useCallback(d=>dispatch({type:'ADD_REC',rec:{...d,id:uid(),lastProcessed:null}}),[]);
  const updRec = useCallback(r=>dispatch({type:'UPD_REC',rec:r}),[]);
  const delRec = useCallback(id=>dispatch({type:'DEL_REC',id}),[]);

  return <Ctx.Provider value={{s,addTx,delTx,addRec,updRec,delRec}}>{children}</Ctx.Provider>;
}
const useApp = () => { const c=useContext(Ctx); if(!c) throw new Error('useApp'); return c; };

/* ════════════════════════════════════════════════════════════════
   ICONS (inline SVG, no deps)
════════════════════════════════════════════════════════════════ */
const I = ({ n, s=18, c='currentColor' }) => {
  const d = {
    wallet:  'M21 4H3a2 2 0 00-2 2v12a2 2 0 002 2h18a2 2 0 002-2V6a2 2 0 00-2-2zm0 14H3V8h18v10zm-3-5a1 1 0 110 2 1 1 0 010-2z',
    list:    'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01',
    chart:   'M18 20V10M12 20V4M6 20v-6M2 20h20',
    refresh: 'M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15',
    plus:    'M12 5v14M5 12h14',
    minus:   'M5 12h14',
    trash:   'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6',
    x:       'M18 6L6 18M6 6l12 12',
    bag:     'M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0',
    receipt: 'M14 2H6a2 2 0 00-2 2v16l4-2 4 2 4-2 4 2V4a2 2 0 00-2-2zM8 9h8M8 13h6',
    cal:     'M3 4h18a2 2 0 012 2v14a2 2 0 01-2 2H3a2 2 0 01-2-2V6a2 2 0 012-2zM16 2v4M8 2v4M1 10h22',
    trend:   'M23 18L13.5 8.5 8.5 13.5 1 6M17 18h6v-6',
    down:    'M12 5v14M19 12l-7 7-7-7',
    up:      'M12 19V5M5 12l7-7 7 7',
    menu:    'M3 6h18M3 12h18M3 18h18',
    star:    'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
    bell:    'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0',
    install: 'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3',
  };
  const path = d[n] || '';
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c}
      strokeWidth="1.85" strokeLinecap="round" strokeLinejoin="round">
      {path.split('M').filter(Boolean).map((seg,i)=>(
        <path key={i} d={'M'+seg} />
      ))}
    </svg>
  );
};

/* ════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════ */
function Toast({msg,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2600); return()=>clearTimeout(t); },[]);
  return <div className="toast"><span className="toast-dot"/>{msg}</div>;
}

/* ════════════════════════════════════════════════════════════════
   SVG CHART
════════════════════════════════════════════════════════════════ */
function LineChart({data}) {
  const W=600,H=160,P={t:12,r:4,b:24,l:4};
  const iW=W-P.l-P.r, iH=H-P.t-P.b;
  const vals=data.map(d=>d.balance);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const rng=mx-mn||1;
  const px=i=>P.l+(i/(data.length-1))*iW;
  const py=v=>P.t+(1-(v-mn)/rng)*iH;

  const line=data.map((d,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(d.balance).toFixed(1)}`).join(' ');
  const area=line+` L${px(data.length-1).toFixed(1)},${(P.t+iH).toFixed(1)} L${P.l},${(P.t+iH).toFixed(1)} Z`;

  const step=Math.max(1,Math.floor(data.length/7));
  const labels=data.filter((_,i)=>i%step===0||i===data.length-1);

  const zeroY=py(0);
  const showZero=zeroY>P.t&&zeroY<P.t+iH;

  return (
    <svg className="chart-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#C8A46A" stopOpacity=".22"/>
          <stop offset="100%" stopColor="#C8A46A" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[.2,.4,.6,.8].map(f=>(
        <line key={f} x1={P.l} y1={(P.t+iH*f).toFixed(1)} x2={W-P.r} y2={(P.t+iH*f).toFixed(1)}
          stroke="#EDEAE3" strokeWidth="1"/>
      ))}
      {showZero&&<line x1={P.l} y1={zeroY.toFixed(1)} x2={W-P.r} y2={zeroY.toFixed(1)}
        stroke="#9E9D95" strokeWidth="1" strokeDasharray="4 3"/>}
      <path d={area} fill="url(#cg)"/>
      <path d={line} fill="none" stroke="#C8A46A" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
      {/* End dot */}

/* ════════════════════════════════════════════════════════════════
   MODAL: TRANSACTIE TOEVOEGEN
════════════════════════════════════════════════════════════════ */
function AddTxModal({defType='expense',onClose,onDone}) {
  const {addTx}=useApp();
  const [type,setType]=useState(defType);
  const [amt,setAmt]=useState('');
  const [desc,setDesc]=useState('');
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [err,setErr]=useState('');
  const amtRef=useRef();

  useEffect(()=>{ setTimeout(()=>amtRef.current?.focus(),80); },[]);

  function save() {
    const v=parseAmt(amt);
    if(!v||v<=0){ setErr('Voer een geldig bedrag in.'); return; }
    if(!desc.trim()){ setErr('Voer een omschrijving in.'); return; }
    addTx(type,v,desc,new Date(date+'T12:00:00').toISOString());
    onDone(`${type==='income'?'Bijschrift':'Uitgave'} van ${fmt€(v)} opgeslagen ✓`);
    onClose();
  }
  const inc=type==='income';

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h2 className="modal-title">{inc?'Nieuw bijschrift':'Nieuwe uitgave'}</h2>
          <button className="icon-btn" onClick={onClose}><I n="x" s={16}/></button>
        </div>
        <div className="modal-body">
          <div className="type-seg">
            <button className={`type-seg-btn income ${inc?'on':''}`} onClick={()=>{setType('income');setErr('');}}>Bijschrift</button>
            <button className={`type-seg-btn expense ${!inc?'on':''}`} onClick={()=>{setType('expense');setErr('');}}>Uitgave</button>
          </div>

          <div>
            <div className="label" style={{marginBottom:8}}>Bedrag</div>
            <div className="amount-field">
              <span className={`amount-sym ${type}`}>€</span>
              <input ref={amtRef} className={`amount-inp ${type}`} placeholder="0,00"
                value={amt} onChange={e=>{setAmt(e.target.value);setErr('');}}
                inputMode="decimal" onKeyDown={e=>e.key==='Enter'&&save()}/>
            </div>
          </div>

          <div className="field">
            <label className="label">Omschrijving</label>
            <input className="input" placeholder="bijv. Zara, schoenen, H&M..."
              value={desc} onChange={e=>{setDesc(e.target.value);setErr('');}}
              onKeyDown={e=>e.key==='Enter'&&save()}/>
          </div>

          <div className="field">
            <label className="label">Datum</label>
            <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>

          {err&&<p className="error-text">{err}</p>}

          <button className={`btn btn-full ${inc?'btn-green':'btn-red'}`}
            style={{padding:'14px',fontSize:15}} onClick={save}>
            {inc?'Bijschrift opslaan':'Uitgave opslaan'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════════ */
function AddRecModal({onClose,onDone}) {
  const {addRec}=useApp();
  const [amt,setAmt]=useState('');
  const [desc,setDesc]=useState('');
  const [freq,setFreq]=useState('monthly');
  const [err,setErr]=useState('');

  function save() {
    const v=parseAmt(amt);
    if(!v||v<=0){ setErr('Voer een geldig bedrag in.'); return; }

    addRec({amount:v,description:desc.trim(),frequency:freq,startDate:new Date().toISOString(),isActive:true});
    onDone(`Herhalend bijschrift "${desc.trim()}" aangemaakt ✓`);
    onClose();
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

        </div>
        <div className="modal-body">
          <div className="field">
            <label className="label">Bedrag (€)</label>
            <input className="input" placeholder="0,00" inputMode="decimal"
              value={amt} onChange={e=>{setAmt(e.target.value);setErr('');}} autoFocus/>

          <div className="field">
            <label className="label">Omschrijving</label>
            <input className="input" placeholder="bijv. Maandelijks kleedgeld"

}

/* ════════════════════════════════════════════════════════════════
   PAGE: GESCHIEDENIS
════════════════════════════════════════════════════════════════ */
function History({open}) {
  const {s,delTx}=useApp();
  const [filter,setFilter]=useState('all');
  const [confirm,setConfirm]=useState(null);

  const grouped=useMemo(()=>{
    const filtered=filter==='all'?s.txs:s.txs.filter(t=>t.type===filter);
    const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const map=new Map();
    sorted.forEach(tx=>{ const k=tx.date.slice(0,7); if(!map.has(k))map.set(k,[]); map.get(k).push(tx); });
    return [...map.entries()].map(([k,txs])=>({label:fmtMonth(k+'-01'),txs}));
  },[s.txs,filter]);

  const total=grouped.reduce((n,g)=>n+g.txs.length,0);

  return (
    <div className="page">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
        <div>
          <h1 className="page-title">Geschiedenis</h1>
          <p className="page-subtitle">{total} transactie{total!==1?'s':''} totaal</p>
        </div>
        <button className="btn btn-dark btn-sm" style={{marginTop:6}} onClick={()=>open('expense')}>
          <I n="plus" s={13} c="#fff"/> Toevoegen
        </button>
      </div>

      <div className="filter-tabs">
        {[['all','Alles'],['income','Bijschriften'],['expense','Uitgaven']].map(([k,l])=>(
          <button key={k} className={`filter-tab ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>

      {grouped.length===0?(
        <div className="empty">
          <div className="empty-icon">🧾</div>
          <p className="empty-title">Geen transacties</p>
          <p className="empty-body">Er zijn geen transacties die overeenkomen met dit filter.</p>
        </div>
      ):(
        grouped.map(({label,txs})=>(
          <div key={label} className="month-group">
            <div className="month-label">{label}</div>
            <div className="card">
              <div className="tx-list">
                {txs.map(tx=><TxRow key={tx.id} tx={tx} onDel={setConfirm}/>)}
              </div>
            </div>
          </div>
        ))
      )}

      {confirm&&<Confirm
        title="Transactie verwijderen?"
        body={`"${confirm.description}" van ${fmt€(confirm.amount)} wordt permanent verwijderd.`}
        onConfirm={()=>{ delTx(confirm.id); setConfirm(null); }}
        onCancel={()=>setConfirm(null)}
      />}
    </div>
  );
}

            <div className="stat-val">{st.val}</div>

      {chart.length>=2&&(
        <div className="chart-card">

            <div className="chart-header-left">
              <h3>Saldo over tijd</h3>
              <p>Afgelopen 60 dagen</p>
            </div>
            <div>
              <div className="chart-current">{fmt€(chart[chart.length-1].balance)}</div>
              <div className="chart-current-label">Huidig saldo</div>
            </div>
          </div>
          <LineChart data={chart}/>

      )}

      {top.length>0&&(
        <div className="card">
          <div className="section-hd" style={{marginBottom:18}}>
            <span className="section-title">Top uitgaven</span>
          </div>
          <div className="top-list">
            {top.map((item,i)=>(
              <div key={i} className="top-row">

                <div className="top-content">
                  <div className="top-labels">
                    <span className="top-name">{item.label}</span>

            ))}

      )}

      {s.txs.length===0&&(
        <div className="empty">
          <div className="empty-icon">📊</div>
          <p className="empty-title">Nog geen data</p>
          <p className="empty-body">Voeg transacties toe om inzichten te zien.</p>

  );

/* ════════════════════════════════════════════════════════════════

  {id:'dashboard', label:'Overzicht',    icon:'wallet' },
  {id:'history',   label:'Geschiedenis', icon:'list'   },
  {id:'insights',  label:'Inzichten',    icon:'chart'  },

/* ════════════════════════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════════════════════════ */
function App() {
  const [page,setPage]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [sideOpen,setSideOpen]=useState(false);
  const [showInstall,setShowInstall]=useState(false);
  const deferredPrompt=useRef(null);

  // PWA install prompt
  useEffect(()=>{
    const handler=e=>{ e.preventDefault(); deferredPrompt.current=e; setShowInstall(true); };
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  // Keyboard shortcut: N = nieuwe uitgave, I = nieuw bijschrift
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if(e.key==='n') setModal('expense');
      if(e.key==='i') setModal('income');
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null),2800); }
  function go(p) { setPage(p); setSideOpen(false); }

  const curPage=PAGES.find(p=>p.id===page)?.label||'Kleedgeld';

  return (
    <Provider>
      <div className="shell">
        {/* Sidebar veil */}
        <div className={`sidebar-veil ${sideOpen?'on':''}`} onClick={()=>setSideOpen(false)}/>

        {/* Sidebar */}
        <aside className={`sidebar ${sideOpen?'open':''}`}>
          <div className="sidebar-inner">
            <div className="brand">
              <div className="brand-icon">K</div>
              <div className="brand-text">
                <h1>Kleedgeld</h1>
                <p>Persoonlijk budget</p>
              </div>
            </div>

            <nav className="nav">
              {PAGES.map(p=>(
                <button key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>go(p.id)}>
                  <I n={p.icon} s={16} c="currentColor"/>
                  {p.label}
                </button>
              ))}
            </nav>

            <div className="sidebar-actions">
              <div style={{fontSize:10,color:'rgba(255,255,255,.2)',letterSpacing:'0.5px',marginBottom:4,paddingLeft:4}}>
                SNELKOPPELING
              </div>
              <button className="sidebar-action-btn expense" onClick={()=>setModal('expense')}>
                <I n="minus" s={14} c="var(--red)"/> Uitgave
              </button>
              <button className="sidebar-action-btn income" onClick={()=>setModal('income')}>
                <I n="plus" s={14} c="var(--green)"/> Bijschrift
              </button>
              <div style={{fontSize:10,color:'rgba(255,255,255,.18)',textAlign:'center',marginTop:4}}>
                Sneltoets: <kbd style={{background:'rgba(255,255,255,.1)',padding:'1px 5px',borderRadius:3,fontFamily:'monospace'}}>N</kbd> /
                <kbd style={{background:'rgba(255,255,255,.1)',padding:'1px 5px',borderRadius:3,fontFamily:'monospace',marginLeft:4}}>I</kbd>
              </div>
            </div>
          </div>
        </aside>

        {/* Main */}
        <main className="main">
          {/* Topbar */}
          <div className="topbar">
            <button className="topbar-btn" onClick={()=>setSideOpen(v=>!v)}>
              <I n="menu" s={18} c="#fff"/>
            </button>
            <span className="topbar-brand">{curPage}</span>
            <div className="topbar-actions">
              <button className="topbar-btn" onClick={()=>setModal('income')}>
                <I n="plus" s={17} c="#fff"/>
              </button>
            </div>
          </div>

          {/* Pages */}
          {page==='dashboard'&&<Dashboard go={go} open={setModal} showInstall={showInstall} onDismissInstall={()=>setShowInstall(false)} deferredPrompt={deferredPrompt.current}/>}
          {page==='history'  &&<History open={setModal}/>}
          {page==='insights' &&<Insights/>}
          {page==='recurring'&&<Recurring onDone={showToast}/>}
        </main>

        {/* Bottom nav */}
        <nav className="bottom-nav">
          <div className="bottom-nav-inner">
            {PAGES.map(p=>(
              <button key={p.id} className={`bottom-nav-btn ${page===p.id?'active':''}`} onClick={()=>go(p.id)}>
                <I n={p.icon} s={20} c="currentColor"/>
                {p.label}
              </button>
            ))}
          </div>
        </nav>
      </div>

      {/* Modals */}
      {modal&&<AddTxModal defType={modal} onClose={()=>setModal(null)} onDone={showToast}/>}

      {/* Toast */}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service Worker voor offline gebruik -->
<script>
if ('serviceWorker' in navigator) {
  const SW_CODE = `
    const CACHE = 'kleedgeld-v2';
    const ASSETS = [self.location.pathname];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          const fresh = fetch(e.request).then(res => {
            if (res && res.status === 200) {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
            }
            return res;
          }).catch(() => cached);
          return cached || fresh;
        })
      );
    });
  `;
  const blob = new Blob([SW_CODE], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
